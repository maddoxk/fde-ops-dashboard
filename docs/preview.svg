<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="bk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f8cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4f8cff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="720" fill="url(#bg)"/>

  <!-- top bar -->
  <text x="32" y="44" fill="#e6edf7" font-size="22" font-weight="700">SaaS Support Ops — Operational Analytics</text>
  <rect x="32" y="56" width="232" height="22" rx="11" fill="#16233b"/>
  <text x="44" y="71" fill="#7fa7e6" font-size="12">SaaS Customer Support Operations</text>
  <text x="280" y="71" fill="#8a97ab" font-size="12">Dec 28 – Jun 25 · 180-day window</text>
  <text x="1068" y="40" fill="#8a97ab" font-size="12" text-anchor="end">Synthetic enterprise dataset · seed 20260626</text>
  <text x="1068" y="58" fill="#8a97ab" font-size="12" text-anchor="end">1,096 records · 35,687 tickets · 889 accounts</text>

  <!-- filter bar -->
  <rect x="32" y="92" width="1036" height="40" rx="10" fill="#0f1828" stroke="#1d2a42"/>
  <text x="48" y="117" fill="#8a97ab" font-size="12">Window:</text>
  <rect x="104" y="102" width="56" height="22" rx="6" fill="#1f3a66"/><text x="132" y="117" fill="#cfe0ff" font-size="12" text-anchor="middle">30d</text>
  <rect x="166" y="102" width="56" height="22" rx="6" fill="#16233b"/><text x="194" y="117" fill="#8a97ab" font-size="12" text-anchor="middle">90d</text>
  <rect x="228" y="102" width="56" height="22" rx="6" fill="#16233b"/><text x="256" y="117" fill="#8a97ab" font-size="12" text-anchor="middle">All</text>
  <text x="980" y="117" fill="#8a97ab" font-size="11" text-anchor="end">filters recompute KPIs &amp; charts</text>

  <!-- KPI cards -->
  <g>
    <!-- card template -->
    <g>
      <rect x="32"  y="146" width="166" height="74" rx="10" fill="#0f1828" stroke="#1d2a42"/>
      <rect x="206" y="146" width="166" height="74" rx="10" fill="#0f1828" stroke="#1d2a42"/>
      <rect x="380" y="146" width="166" height="74" rx="10" fill="#0f1828" stroke="#1d2a42"/>
      <rect x="554" y="146" width="166" height="74" rx="10" fill="#0f1828" stroke="#1d2a42"/>
      <rect x="728" y="146" width="166" height="74" rx="10" fill="#0f1828" stroke="#1d2a42"/>
      <rect x="902" y="146" width="166" height="74" rx="10" fill="#0f1828" stroke="#1d2a42"/>
    </g>
    <text x="46"  y="168" fill="#8a97ab" font-size="11">SLA Compliance (30d)</text>
    <text x="46"  y="196" fill="#fbbf24" font-size="24" font-weight="700">87.4%</text>
    <text x="46"  y="212" fill="#6b7890" font-size="10">target 90% · lifetime 88.9%</text>

    <text x="220" y="168" fill="#8a97ab" font-size="11">Throughput (30d)</text>
    <text x="220" y="196" fill="#e6edf7" font-size="24" font-weight="700">5,914</text>
    <text x="220" y="212" fill="#34d399" font-size="10">▲ 6.2% vs prior 30d</text>

    <text x="394" y="168" fill="#8a97ab" font-size="11">Open Backlog</text>
    <text x="394" y="196" fill="#e6edf7" font-size="24" font-weight="700">1,059</text>
    <text x="394" y="212" fill="#6b7890" font-size="10">tickets awaiting resolution</text>

    <text x="568" y="168" fill="#8a97ab" font-size="11">Median First Response</text>
    <text x="568" y="196" fill="#e6edf7" font-size="24" font-weight="700">3.1h</text>
    <text x="568" y="212" fill="#6b7890" font-size="10">across all priorities</text>

    <text x="742" y="168" fill="#8a97ab" font-size="11">CSAT (30d)</text>
    <text x="742" y="196" fill="#e6edf7" font-size="24" font-weight="700">4.41</text>
    <text x="742" y="212" fill="#6b7890" font-size="10">out of 5.00</text>

    <text x="916" y="168" fill="#8a97ab" font-size="11">Critical Alerts</text>
    <text x="916" y="196" fill="#f87171" font-size="24" font-weight="700">31</text>
    <text x="916" y="212" fill="#6b7890" font-size="10">35,687 tickets · 889 accounts</text>
  </g>

  <!-- SLA chart -->
  <rect x="32" y="234" width="690" height="220" rx="10" fill="#0f1828" stroke="#1d2a42"/>
  <text x="48" y="258" fill="#e6edf7" font-size="14" font-weight="600">SLA Compliance &amp; Breaches</text>
  <line x1="48" y1="300" x2="706" y2="300" stroke="#fbbf24" stroke-dasharray="5 4" stroke-opacity="0.6"/>
  <text x="710" y="304" fill="#fbbf24" font-size="9" text-anchor="end">90%</text>
  <polyline fill="none" stroke="#34d399" stroke-width="2"
    points="48,296 110,290 172,308 234,330 296,360 358,372 420,350 482,326 544,312 606,300 668,294 706,292"/>
  <polygon fill="#f87171" fill-opacity="0.18" stroke="#f87171" stroke-width="1"
    points="48,440 110,432 172,418 234,398 296,372 358,360 420,378 482,402 544,418 606,430 668,438 706,440 706,448 48,448"/>

  <!-- priority breakdown -->
  <rect x="734" y="234" width="334" height="220" rx="10" fill="#0f1828" stroke="#1d2a42"/>
  <text x="750" y="258" fill="#e6edf7" font-size="14" font-weight="600">SLA by Priority</text>
  <g font-size="11" fill="#8a97ab">
    <text x="750" y="296">P1 ≤1h</text><rect x="812" y="286" width="150" height="13" fill="#34d399"/><rect x="962" y="286" width="86" height="13" fill="#f87171"/>
    <text x="750" y="326">P2 ≤4h</text><rect x="812" y="316" width="200" height="13" fill="#34d399"/><rect x="1012" y="316" width="40" height="13" fill="#f87171"/>
    <text x="750" y="356">P3 ≤24h</text><rect x="812" y="346" width="232" height="13" fill="#34d399"/><rect x="1044" y="346" width="14" height="13" fill="#f87171"/>
    <text x="750" y="386">P4 ≤72h</text><rect x="812" y="376" width="240" height="13" fill="#34d399"/><rect x="1052" y="376" width="8" height="13" fill="#f87171"/>
  </g>
  <text x="812" y="420" fill="#6b7890" font-size="10">▇ Met   ▇ Breached  (tighter SLAs breach more under load)</text>

  <!-- throughput -->
  <rect x="32" y="466" width="690" height="200" rx="10" fill="#0f1828" stroke="#1d2a42"/>
  <text x="48" y="490" fill="#e6edf7" font-size="14" font-weight="600">Throughput — Inflow vs. Resolved</text>
  <g>
    <!-- bars -->
    <g fill="#4f8cff" fill-opacity="0.55">
      <rect x="60" y="560" width="10" height="86"/><rect x="110" y="552" width="10" height="94"/><rect x="160" y="566" width="10" height="80"/>
      <rect x="210" y="548" width="10" height="98"/><rect x="260" y="540" width="10" height="106"/><rect x="310" y="556" width="10" height="90"/>
      <rect x="360" y="544" width="10" height="102"/><rect x="410" y="558" width="10" height="88"/><rect x="460" y="550" width="10" height="96"/>
      <rect x="510" y="562" width="10" height="84"/><rect x="560" y="554" width="10" height="92"/><rect x="610" y="548" width="10" height="98"/><rect x="660" y="556" width="10" height="90"/>
    </g>
    <g fill="#34d399" fill-opacity="0.6">
      <rect x="72" y="570" width="10" height="76"/><rect x="122" y="566" width="10" height="80"/><rect x="172" y="574" width="10" height="72"/>
      <rect x="222" y="560" width="10" height="86"/><rect x="272" y="556" width="10" height="90"/><rect x="322" y="568" width="10" height="78"/>
      <rect x="372" y="558" width="10" height="88"/><rect x="422" y="570" width="10" height="76"/><rect x="472" y="562" width="10" height="84"/>
      <rect x="522" y="574" width="10" height="72"/><rect x="572" y="566" width="10" height="80"/><rect x="622" y="560" width="10" height="86"/><rect x="672" y="568" width="10" height="78"/>
    </g>
    <polyline fill="none" stroke="#fbbf24" stroke-width="2"
      points="66,548 116,544 166,552 216,540 266,536 316,546 366,538 416,550 466,542 516,556 566,548 616,540 666,546"/>
  </g>

  <!-- backlog -->
  <rect x="734" y="466" width="334" height="200" rx="10" fill="#0f1828" stroke="#1d2a42"/>
  <text x="750" y="490" fill="#e6edf7" font-size="14" font-weight="600">Backlog Over Time</text>
  <line x1="750" y1="540" x2="1052" y2="540" stroke="#fbbf24" stroke-dasharray="5 4" stroke-opacity="0.6"/>
  <text x="1052" y="536" fill="#fbbf24" font-size="9" text-anchor="end">alert 400</text>
  <polygon fill="url(#bk)" stroke="#4f8cff" stroke-width="2"
    points="750,628 786,620 822,600 858,560 894,520 930,506 966,520 1002,556 1038,600 1052,624 1052,648 750,648"/>

  <!-- footer -->
  <text x="32" y="700" fill="#6b7890" font-size="11">FDE Ops Dashboard · github.com/maddoxk/fde-ops-dashboard · synthetic data, no real customers</text>
  <text x="1068" y="700" fill="#6b7890" font-size="11" text-anchor="end">Heatmap · Cohort matrix · Alerts panel below the fold</text>
</svg>
