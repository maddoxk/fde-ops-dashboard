# Local / on-prem customer deployment: build the dashboard and serve it via nginx.
#   docker compose up --build   ->   http://localhost:8080
services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: fde-ops-dashboard:latest
    container_name: fde-ops-dashboard
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
